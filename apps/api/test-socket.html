<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portl Step 2.5 — Socket.IO Real-Time Tester</title>
  <!-- Load socket.io-client from CDN -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h1 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 1.5rem;
      border-bottom: 1px solid #334155;
      padding-bottom: 1rem;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border-radius: 8px;
      font-weight: 600;
    }
    .badge {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444; // disconnected
    }
    .badge.connected {
      background: #22c55e;
    }
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f8fafc;
      font-size: 0.95rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0284c7;
      color: #fff;
    }
    .logs {
      background: #0f172a;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      max-height: 400px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85rem;
    }
    .log-item {
      margin-bottom: 1rem;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 0.75rem;
    }
    .log-item:last-child {
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .event-title {
      color: #e2e8f0;
      font-weight: bold;
      margin-bottom: 0.25rem;
    }
    .event-new { color: #22c55e; }
    .event-decided { color: #f59e0b; }
    pre {
      margin: 0;
      color: #94a3b8;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Portl Step 2.5 — Socket.IO Real-Time Tester</h1>
    
    <div class="status-bar">
      <div id="statusBadge" class="badge"></div>
      <span id="statusText">Disconnected from server</span>
    </div>

    <div class="controls">
      <input 
        type="text" 
        id="flatIdInput" 
        value="c0000000-0000-0000-0000-000000000001" 
        placeholder="Enter Flat ID (e.g. c0000...)" 
      />
      <button id="joinBtn">Join Room</button>
    </div>

    <div class="logs" id="logContainer">
      <div class="log-item">
        <div class="event-title">⏳ Waiting for events...</div>
        <pre>Join a flat's room above, then trigger POST /visitor-requests or PATCH /visitor-requests/:id</pre>
      </div>
    </div>
  </div>

  <script>
    const socket = io('http://localhost:3000', {
      transports: ['websocket', 'polling']
    });

    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    const joinBtn = document.getElementById('joinBtn');
    const flatIdInput = document.getElementById('flatIdInput');
    const logContainer = document.getElementById('logContainer');
    let hasLogs = false;

    function addLog(eventName, payload, isNew = false) {
      if (!hasLogs) {
        logContainer.innerHTML = '';
        hasLogs = true;
      }
      const item = document.createElement('div');
      item.className = 'log-item';
      
      const timeStr = new Date().toLocaleTimeString();
      const colorClass = isNew ? 'event-new' : 'event-decided';
      
      item.innerHTML = `
        <div class="event-title ${colorClass}">[${timeStr}] Event: '${eventName}'</div>
        <pre>${JSON.stringify(payload, null, 2)}</pre>
      `;
      logContainer.prepend(item);
    }

    socket.on('connect', () => {
      statusBadge.classList.add('connected');
      statusText.textContent = `Connected (Socket ID: ${socket.id})`;
      // Automatically join initial room on connect
      const initialFlat = flatIdInput.value.trim();
      if (initialFlat) {
        socket.emit('join', initialFlat);
        addLog('join', { room: `flat:${initialFlat}`, message: 'Sent join request on connect' });
      }
    });

    socket.on('disconnect', () => {
      statusBadge.classList.remove('connected');
      statusText.textContent = 'Disconnected from server';
    });

    joinBtn.addEventListener('click', () => {
      const flatId = flatIdInput.value.trim();
      if (flatId && socket.connected) {
        socket.emit('join', flatId);
        addLog('join', { room: `flat:${flatId}`, message: 'Joined room requested by button click' });
      } else if (!socket.connected) {
        alert('Socket not connected yet!');
      }
    });

    socket.on('visitor:new', (data) => {
      addLog('visitor:new', data, true);
    });

    socket.on('visitor:decided', (data) => {
      addLog('visitor:decided', data, false);
    });
  </script>
</body>
</html>
